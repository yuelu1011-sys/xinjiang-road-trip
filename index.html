}
.tl-item {
  position: relative; margin-bottom: 14px;
  padding-left: 16px;
}
.tl-dot {
  position: absolute; left: -20px; top: 4px;

.tl-time { font-size: 11px; font-weight: 700; margin-bottom: 2px; }

let routeLayers = [];
let markerLayers = [];
let labelLayers = [];

// ── 创建标记 ──
function createMarker(latlng, color, isActive, name) {
  const size = isActive ? 14 : 10;
  const icon = L.divIcon({
    className: '',
    html: `<div style="width:${size}px;height:${size}px;background:${color};border:3px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.3);"></div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2],
  });
  const m = L.marker(latlng, { icon });
  if (name) m.bindTooltip(name, { permanent: false, direction: 'top' });
  return m;
}

function createLabel(latlng, name, isActive) {
  return L.marker(latlng, {
    icon: L.divIcon({
      className: `city-label ${isActive ? 'city-label-active' : ''}`,
      html: name,
      iconSize: [80, 20],
      iconAnchor: [40, -10],
    }),
  });
}

// ── 绘制路线 ──
function drawPolyline(coords, color, dashed, weight) {
  return L.polyline(coords, {
    color: color,
    weight: weight || (dashed ? 3 : 4),
    opacity: 0.85,
    dashArray: dashed ? '10 8' : null,
    smoothFactor: 1,
    lineJoin: 'round',
  });
}

// ── 清除图层 ──
function clearLayers() {
  routeLayers.forEach(l => map.removeLayer(l));
  markerLayers.forEach(l => map.removeLayer(l));
  labelLayers.forEach(l => map.removeLayer(l));
  routeLayers = [];
  markerLayers = [];
  labelLayers = [];
}

// ── 获取某天所有坐标用于 fitBounds ──
function getDayBounds(idx) {
  const seg = dayRouteSegments[idx];
  let allPts = [];
  if (seg.fly) allPts = allPts.concat(realRoutes[seg.fly]);
  if (seg.train) allPts = allPts.concat(realRoutes[seg.train]);
  if (seg.drive) seg.drive.forEach(k => { allPts = allPts.concat(realRoutes[k]); });
  return allPts;
}

// ── 显示某一天 ──
function showDay(idx) {
  clearLayers();
  currentDay = idx;
  const d = days[idx];
  const seg = dayRouteSegments[idx];
  const color = d.color;

  // 飞行弧线
  if (seg.fly) {
    const line = drawPolyline(realRoutes[seg.fly], '#999', true, 2);
    line.addTo(map);
    routeLayers.push(line);
    // 起点终点标记
    const flyPts = realRoutes[seg.fly];
    const m1 = createMarker(flyPts[0], '#999', true);
    m1.addTo(map); markerLayers.push(m1);
    const lb1 = createLabel(flyPts[0], '北京', true);
    lb1.addTo(map); labelLayers.push(lb1);
  }

  // 高铁线
  if (seg.train) {
    const line = drawPolyline(realRoutes[seg.train], color, true, 3);
    line.addTo(map);
    routeLayers.push(line);
  }

  // 自驾线
  if (seg.drive) {
    seg.drive.forEach(k => {
      const line = drawPolyline(realRoutes[k], color, false, 4);
      line.addTo(map);
      routeLayers.push(line);
    });
  }

  // 标记途经城市
  const allKeys = new Set([...(d.trainRoute || []), ...d.route]);
  if (d.flyFrom) allKeys.add(d.flyFrom);
  allKeys.forEach(k => {
    if (k === 'beijing') return; // 已在飞行弧线处标记
    const c = cities[k];
    const m = createMarker([c.lat, c.lng], color, true);
    m.addTo(map); markerLayers.push(m);
    const lb = createLabel([c.lat, c.lng], c.name, true);
    lb.addTo(map); labelLayers.push(lb);
  });

  // 调整视野
  const bounds = getDayBounds(idx);
  if (bounds.length > 1) {
    map.fitBounds(bounds, { padding: [60, 60], maxZoom: 12 });
  }

  // 更新 tab 样式
  document.querySelectorAll('.day-tab').forEach((tab, i) => {
    tab.classList.toggle('active', i === idx);
    tab.style.background = i === idx ? COLORS[i] : '#fff';
    tab.style.color = i === idx ? '#fff' : '#666';
  });

  renderDetail(idx);
}

// ── 显示全程 ──
function showAll() {
  clearLayers();
  currentDay = -1;

  // 绘制所有路线
  dayRouteSegments.forEach((seg, i) => {
    const color = COLORS[i];
    if (seg.fly) {
      const line = drawPolyline(realRoutes[seg.fly], '#999', true, 2);
      line.addTo(map); routeLayers.push(line);
    }
    if (seg.train) {
      const line = drawPolyline(realRoutes[seg.train], color, true, 3);
      line.addTo(map); routeLayers.push(line);
    }
    if (seg.drive) {
      seg.drive.forEach(k => {
        const line = drawPolyline(realRoutes[k], color, false, 3);
        line.addTo(map); routeLayers.push(line);
      });
    }
  });

  // 标记主要城市
  const mainCities = ['urumqi','yining','nalati','kuerdening','tekesi','sayram','bole'];
  mainCities.forEach(k => {
    const c = cities[k];
    const m = createMarker([c.lat, c.lng], '#3d7a5a', false);
    m.addTo(map); markerLayers.push(m);
    const lb = createLabel([c.lat, c.lng], c.name, false);
    lb.addTo(map); labelLayers.push(lb);
  });

  map.fitBounds(mainCities.map(k => [cities[k].lat, cities[k].lng]), { padding: [60, 60] });

  document.querySelectorAll('.day-tab').forEach(tab => {
    tab.classList.remove('active');
    tab.style.background = '#fff';
    tab.style.color = '#666';
  });

  renderAllDetail();
}

// ── 渲染详情面板 ──
function renderDetail(idx) {
  const d = days[idx];
  let html = `
    <div class="route-header">
      <span class="route-badge" style="background:${d.color}">${d.day}</span>
      <span class="route-title">${d.title}</span>
    </div>
    <div class="route-meta">
      <span>📅 ${d.date}</span>
      <span>🚗 ${d.dist}</span>
    </div>
  `;

  // 时间线
  html += '<div class="timeline">';
  d.schedule.forEach(s => {
    html += `
      <div class="tl-item">
        <div class="tl-dot" style="border-color:${d.color}"></div>
        <div class="tl-time" style="color:${d.color}">${s.time}</div>
        <div class="tl-text">${s.text}</div>
        ${s.note ? `<div class="tl-note">${s.note}</div>` : ''}
      </div>`;
  });
  html += '</div>';

  // 住宿
  if (d.hotel) {
    html += `
      <div class="info-card hotel">
        <h4>🏨 住宿：${d.hotel.name}</h4>
        <p>📍 ${d.hotel.addr}</p>
        <p>💰 ${d.hotel.price}</p>
      </div>`;
  }

  // 美食
  if (d.food && d.food.length) {
    html += `<div class="info-card food"><h4>🍽️ 当地美食推荐</h4><ul>`;
    d.food.forEach(([name, desc]) => {
      html += `<li><strong>${name}</strong>：${desc}</li>`;
    });
    html += '</ul></div>';
  }

  // 攻略
  if (d.tips && d.tips.length) {
    html += `<div class="info-card tips"><h4>📋 景点攻略</h4><ul>`;
    d.tips.forEach(([title, content]) => {
      html += `<li><strong>${title}</strong>：${content}</li>`;
    });
    html += '</ul></div>';
  }

  document.getElementById('dayDetail').innerHTML = html;
}

function renderAllDetail() {
  let html = '<div style="text-align:center;padding:40px 0;color:#999;">';
  html += '<div style="font-size:40px;margin-bottom:12px;">🗺️</div>';
  html += '<div style="font-size:15px;font-weight:600;color:#333;margin-bottom:8px;">全程路线总览</div>';
  html += '<div style="font-size:12px;line-height:1.8;">';
  html += '乌鲁木齐 → 伊宁 → 那拉提 → 库尔德宁<br>→ 特克斯 → 伊宁 → 赛里木湖 → 博乐<br><br>';
  html += '自驾总里程约 <strong>950 公里</strong><br>';
  html += '主要路线：G218 · G30 连霍高速<br><br>';
  html += '点击上方天数按钮查看每日详情</div></div>';
  document.getElementById('dayDetail').innerHTML = html;
}

// ── 初始化 tabs ──
const tabsEl = document.getElementById('dayTabs');
days.forEach((d, i) => {
  const tab = document.createElement('div');
  tab.className = 'day-tab';
  tab.textContent = d.day;
  tab.onclick = () => showDay(i);
  tabsEl.appendChild(tab);
});

document.getElementById('btnAll').onclick = showAll;

// 默认显示全程
showAll();
</script>
</body>
</html>
